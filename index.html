<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI - Glass Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f172a',
                        darkpanel: '#1e293b'
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base & Mobile Fixes */
        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            color: #1e293b;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background 0.3s ease;
        }
        .dark body {
            background: linear-gradient(135deg, #0f172a 0%, #172554 100%);
            color: #f8fafc;
        }

        /* Glassmorphism & Glowing Effects */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .glow-btn {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }
        .glow-btn:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8);
            transform: translateY(-1px);
        }

        .msg-glow-ai { box-shadow: 0 4px 20px rgba(16, 185, 129, 0.1); }
        .msg-glow-user { box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15); }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.5); }

        /* Markdown Styling */
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .markdown-body code {
            font-family: monospace;
            background: rgba(156, 163, 175, 0.2);
            padding: 0.1rem 0.3rem;
            border-radius: 0.25rem;
        }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body strong { font-weight: 700; color: inherit; }

        /* Hide Scrollbar for Sidebar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loader */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #38bdf8;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 9999;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            transition: opacity 0.5s ease;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: currentColor;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="flex flex-col items-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
            <span>Initializing AI...</span>
        </div>
    </div>

    <div id="app" class="hidden flex-1 flex flex-col md:flex-row relative min-h-[100dvh]">
        
        <aside id="sidebar" class="glass fixed md:relative z-40 w-72 h-[100dvh] md:h-auto flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 border-r">
            <div class="p-4 flex justify-between items-center border-b border-gray-200 dark:border-gray-700">
                <button id="btn-new-chat" class="glass glow-btn flex-1 py-2 px-4 rounded-xl flex items-center justify-center gap-2 text-blue-600 dark:text-blue-400 font-semibold bg-white/50 dark:bg-gray-800/50">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
                <button id="btn-close-sidebar" class="md:hidden ml-2 p-2 text-gray-500 hover:text-gray-800 dark:hover:text-white">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto no-scrollbar p-3 space-y-2">
                </div>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-3">
                <button id="btn-settings" class="w-full text-left p-3 rounded-xl hover:bg-gray-200/50 dark:hover:bg-gray-700/50 transition flex items-center gap-3">
                    <i class="fa-solid fa-gear text-gray-500"></i> Settings
                </button>
                <button id="btn-theme" class="w-full text-left p-3 rounded-xl hover:bg-gray-200/50 dark:hover:bg-gray-700/50 transition flex items-center gap-3">
                    <i class="fa-solid fa-moon text-gray-500" id="theme-icon"></i> <span id="theme-text">Dark Mode</span>
                </button>
            </div>
        </aside>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

        <main class="flex-1 flex flex-col relative min-w-0 h-[100dvh]">
            
            <header class="glass sticky top-0 z-20 p-4 flex justify-between items-center md:hidden border-b">
                <button id="btn-menu" class="text-gray-600 dark:text-gray-300 p-1">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h1 class="font-bold text-lg bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500">Universal AI</h1>
                <button id="btn-mobile-new" class="text-blue-500 p-1">
                    <i class="fa-solid fa-pen-to-square text-xl"></i>
                </button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32 scroll-smooth">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center opacity-70">
                    <i class="fa-solid fa-sparkles text-5xl mb-4 text-blue-500 glow-btn rounded-full p-4 bg-blue-100 dark:bg-blue-900/30"></i>
                    <h2 class="text-2xl font-bold mb-2">How can I help you today?</h2>
                    <p class="text-sm max-w-md">Powered by OpenRouter. Ensure your API key is set in settings.</p>
                </div>
                </div>

            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white via-white to-transparent dark:from-darkbg dark:via-darkbg pb-6 z-20">
                <div class="max-w-4xl mx-auto relative flex items-end gap-2">
                    <textarea id="chat-input" rows="1" class="glass w-full rounded-3xl pl-6 pr-14 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none max-h-32 text-gray-800 dark:text-gray-100" placeholder="Message AI..."></textarea>
                    <button id="btn-send" class="absolute right-2 bottom-2 p-3 bg-blue-500 hover:bg-blue-600 text-white rounded-full glow-btn disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center justify-center h-10 w-10">
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="glass w-full max-w-md rounded-2xl p-6 shadow-2xl relative">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-sliders text-blue-500"></i> Configuration</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">OpenRouter API Key</label>
                    <input type="password" id="input-api-key" class="w-full p-3 rounded-xl glass bg-white/50 dark:bg-black/20 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-or-v1-...">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-1">Model Name</label>
                    <input type="text" id="input-model" class="w-full p-3 rounded-xl glass bg-white/50 dark:bg-black/20 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="deepseek/deepseek-r1:free">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-1">Global System Prompt</label>
                    <textarea id="input-system" rows="3" class="w-full p-3 rounded-xl glass bg-white/50 dark:bg-black/20 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button id="btn-close-settings" class="px-5 py-2 rounded-xl glass hover:bg-gray-200 dark:hover:bg-gray-700 transition">Cancel</button>
                <button id="btn-save-settings" class="px-5 py-2 rounded-xl bg-blue-600 text-white glow-btn hover:bg-blue-700 transition">Save</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- STATE MANAGEMENT ---
            let chats = JSON.parse(localStorage.getItem('chats')) || [];
            let currentChatId = localStorage.getItem('currentChatId') || null;
            let settings = JSON.parse(localStorage.getItem('settings')) || {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are an intelligent and helpful AI assistant.',
                theme: 'light'
            };
            let isGenerating = false;

            // Ensure currentChatId is valid
            if (currentChatId && !chats.find(c => c.id === currentChatId)) currentChatId = null;

            // --- DOM ELEMENTS ---
            const els = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                chatList: document.getElementById('chat-list'),
                chatContainer: document.getElementById('chat-container'),
                emptyState: document.getElementById('empty-state'),
                chatInput: document.getElementById('chat-input'),
                btnSend: document.getElementById('btn-send'),
                btnNewChat: document.getElementById('btn-new-chat'),
                btnMobileNew: document.getElementById('btn-mobile-new'),
                btnMenu: document.getElementById('btn-menu'),
                btnCloseSidebar: document.getElementById('btn-close-sidebar'),
                btnSettings: document.getElementById('btn-settings'),
                btnTheme: document.getElementById('btn-theme'),
                themeIcon: document.getElementById('theme-icon'),
                themeText: document.getElementById('theme-text'),
                settingsModal: document.getElementById('settings-modal'),
                inputApiKey: document.getElementById('input-api-key'),
                inputModel: document.getElementById('input-model'),
                inputSystem: document.getElementById('input-system'),
                btnSaveSettings: document.getElementById('btn-save-settings'),
                btnCloseSettings: document.getElementById('btn-close-settings')
            };

            // --- INITIALIZATION ---
            function init() {
                applyTheme(settings.theme);
                renderChatList();
                if (currentChatId) {
                    renderChat(currentChatId);
                } else {
                    createNewChat(false);
                }
                
                // Hide loader, show app
                setTimeout(() => {
                    els.loading.style.opacity = '0';
                    setTimeout(() => {
                        els.loading.style.display = 'none';
                        els.app.classList.remove('hidden');
                    }, 500);
                }, 300); // Small delay to ensure styles map properly
            }

            // --- THEME ---
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    els.themeIcon.classList.replace('fa-moon', 'fa-sun');
                    els.themeText.textContent = 'Light Mode';
                } else {
                    document.documentElement.classList.remove('dark');
                    els.themeIcon.classList.replace('fa-sun', 'fa-moon');
                    els.themeText.textContent = 'Dark Mode';
                }
                settings.theme = theme;
                saveData();
            }

            els.btnTheme.addEventListener('click', () => {
                applyTheme(settings.theme === 'dark' ? 'light' : 'dark');
            });

            // --- DATA PERSISTENCE ---
            function saveData() {
                try {
                    localStorage.setItem('chats', JSON.stringify(chats));
                    localStorage.setItem('currentChatId', currentChatId);
                    localStorage.setItem('settings', JSON.stringify(settings));
                } catch (e) {
                    console.error("Failed to save data to localStorage", e);
                }
            }

            // --- SIDEBAR & MOBILE MENU ---
            function toggleSidebar(show) {
                if (show) {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarOverlay.classList.remove('hidden');
                } else {
                    els.sidebar.classList.add('-translate-x-full');
                    els.sidebarOverlay.classList.add('hidden');
                }
            }

            els.btnMenu.addEventListener('click', () => toggleSidebar(true));
            els.btnCloseSidebar.addEventListener('click', () => toggleSidebar(false));
            els.sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

            // --- SETTINGS MODAL ---
            function openSettings() {
                els.inputApiKey.value = settings.apiKey;
                els.inputModel.value = settings.model || 'deepseek/deepseek-r1:free';
                els.inputSystem.value = settings.systemPrompt || '';
                els.settingsModal.classList.remove('hidden');
                els.settingsModal.classList.add('flex');
            }

            function closeSettings() {
                els.settingsModal.classList.add('hidden');
                els.settingsModal.classList.remove('flex');
            }

            els.btnSettings.addEventListener('click', () => {
                toggleSidebar(false);
                openSettings();
            });
            els.btnCloseSettings.addEventListener('click', closeSettings);
            
            els.btnSaveSettings.addEventListener('click', () => {
                settings.apiKey = els.inputApiKey.value.trim();
                settings.model = els.inputModel.value.trim() || 'deepseek/deepseek-r1:free';
                settings.systemPrompt = els.inputSystem.value.trim();
                saveData();
                closeSettings();
            });

            // --- CHAT MANAGEMENT ---
            function createNewChat(render = true) {
                const newChat = {
                    id: 'chat_' + Date.now(),
                    title: 'New Conversation',
                    messages: []
                };
                chats.unshift(newChat);
                currentChatId = newChat.id;
                saveData();
                if (render) {
                    renderChatList();
                    renderChat(currentChatId);
                    toggleSidebar(false);
                }
            }

            els.btnNewChat.addEventListener('click', () => createNewChat(true));
            els.btnMobileNew.addEventListener('click', () => createNewChat(true));

            function deleteChat(id, e) {
                e.stopPropagation();
                if(!confirm('Delete this chat?')) return;
                chats = chats.filter(c => c.id !== id);
                if (currentChatId === id) {
                    currentChatId = chats.length > 0 ? chats[0].id : null;
                    if(!currentChatId) createNewChat(false);
                }
                saveData();
                renderChatList();
                renderChat(currentChatId);
            }

            function renameChat(id, e) {
                e.stopPropagation();
                const chat = chats.find(c => c.id === id);
                const newTitle = prompt('Rename chat:', chat.title);
                if (newTitle && newTitle.trim() !== '') {
                    chat.title = newTitle.trim();
                    saveData();
                    renderChatList();
                }
            }

            function renderChatList() {
                els.chatList.innerHTML = '';
                chats.forEach(chat => {
                    const isActive = chat.id === currentChatId;
                    const div = document.createElement('div');
                    div.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition ${isActive ? 'bg-blue-500/10 text-blue-600 dark:text-blue-400 glass' : 'hover:bg-gray-200/50 dark:hover:bg-gray-700/50'}`;
                    
                    div.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <i class="fa-regular fa-message text-sm opacity-70"></i>
                            <span class="truncate text-sm font-medium">${chat.title}</span>
                        </div>
                        <div class="hidden group-hover:flex items-center gap-2">
                            <button class="btn-rename text-xs text-gray-400 hover:text-blue-500"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-delete text-xs text-gray-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    `;
                    
                    div.addEventListener('click', () => {
                        currentChatId = chat.id;
                        saveData();
                        renderChatList();
                        renderChat(currentChatId);
                        toggleSidebar(false);
                    });

                    div.querySelector('.btn-delete').addEventListener('click', (e) => deleteChat(chat.id, e));
                    div.querySelector('.btn-rename').addEventListener('click', (e) => renameChat(chat.id, e));
                    
                    els.chatList.appendChild(div);
                });
            }

            function renderChat(id) {
                const chat = chats.find(c => c.id === id);
                if (!chat) return;

                document.querySelectorAll('.message-bubble').forEach(el => el.remove());
                
                if (chat.messages.length === 0) {
                    els.emptyState.style.display = 'flex';
                } else {
                    els.emptyState.style.display = 'none';
                    chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content, false));
                    scrollToBottom();
                }
            }

            // --- MESSAGING LOGIC ---
            function appendMessageUI(role, content, isTyping = false) {
                els.emptyState.style.display = 'none';
                const wrapper = document.createElement('div');
                wrapper.className = `message-bubble flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
                
                const bubble = document.createElement('div');
                bubble.className = `max-w-[85%] md:max-w-[75%] p-4 glass ${role === 'user' 
                    ? 'bg-blue-500/20 text-gray-900 dark:text-white rounded-2xl rounded-tr-sm msg-glow-user' 
                    : 'bg-white/60 dark:bg-gray-800/60 text-gray-900 dark:text-gray-100 rounded-2xl rounded-tl-sm msg-glow-ai markdown-body'}`;
                
                if (isTyping) {
                    bubble.innerHTML = `<div class="typing-indicator text-blue-500 dark:text-blue-400"><span></span><span></span><span></span></div>`;
                    bubble.id = 'active-typing-bubble';
                } else {
                    bubble.innerHTML = role === 'user' ? escapeHTML(content) : marked.parse(content);
                }

                wrapper.appendChild(bubble);
                els.chatContainer.appendChild(wrapper);
                scrollToBottom();
                return bubble;
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag]));
            }

            function scrollToBottom() {
                els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
            }

            // Auto-resize textarea
            els.chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight < 128 ? this.scrollHeight : 128) + 'px';
            });

            // Handle Send
            async function sendMessage() {
                if (isGenerating) return;
                const text = els.chatInput.value.trim();
                if (!text) return;

                if (!settings.apiKey) {
                    alert("Please set your OpenRouter API Key in settings first.");
                    openSettings();
                    return;
                }

                const chat = chats.find(c => c.id === currentChatId);
                if (!chat) return;

                // 1. Add User Message
                chat.messages.push({ role: 'user', content: text });
                
                // Auto-generate title for first message
                if (chat.messages.length === 1) {
                    chat.title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                    renderChatList();
                }

                saveData();
                appendMessageUI('user', text);
                
                els.chatInput.value = '';
                els.chatInput.style.height = 'auto';
                
                // 2. Setup AI response state
                isGenerating = true;
                els.btnSend.disabled = true;
                els.btnSend.innerHTML = '<i class="fa-solid fa-stop text-sm"></i>';
                
                const bubbleElement = appendMessageUI('assistant', '', true);
                let fullResponse = "";

                // 3. API Call via OpenRouter
                try {
                    const apiMessages = [];
                    if (settings.systemPrompt) {
                        apiMessages.push({ role: 'system', content: settings.systemPrompt });
                    }
                    // Only send last 10 messages to save context limit roughly
                    const recentMessages = chat.messages.slice(-10);
                    apiMessages.push(...recentMessages);

                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${settings.apiKey}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'Universal AI SingleFile'
                        },
                        body: JSON.stringify({
                            model: settings.model,
                            messages: apiMessages,
                            stream: true
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || `HTTP ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // Keep incomplete chunk

                        for (const line of lines) {
                            if (line.trim() === '') continue;
                            if (line.trim() === 'data: [DONE]') break;
                            
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.substring(6));
                                    const content = data.choices[0]?.delta?.content || "";
                                    fullResponse += content;
                                    
                                    // Live update UI
                                    if (fullResponse) {
                                        bubbleElement.innerHTML = marked.parse(fullResponse);
                                        // Only scroll to bottom if user hasn't scrolled up
                                        const isAtBottom = els.chatContainer.scrollHeight - els.chatContainer.scrollTop <= els.chatContainer.clientHeight + 100;
                                        if (isAtBottom) scrollToBottom();
                                    }
                                } catch (e) {
                                    // Incomplete JSON, wait for next chunk
                                }
                            }
                        }
                    }

                } catch (error) {
                    console.error("API Error:", error);
                    fullResponse = `**Error:** ${error.message}\n\nPlease check your API key and connection.`;
                    bubbleElement.innerHTML = marked.parse(fullResponse);
                    bubbleElement.classList.replace('msg-glow-ai', 'shadow-[0_4px_20px_rgba(239,68,68,0.2)]');
                } finally {
                    // Finalize save
                    bubbleElement.removeAttribute('id'); // remove typing id
                    if (!fullResponse) fullResponse = "No response generated.";
                    
                    // Sanity check before saving back
                    chat.messages.push({ role: 'assistant', content: fullResponse });
                    saveData();
                    
                    isGenerating = false;
                    els.btnSend.disabled = false;
                    els.btnSend.innerHTML = '<i class="fa-solid fa-paper-plane text-sm"></i>';
                    scrollToBottom();
                }
            }

            els.btnSend.addEventListener('click', sendMessage);
            
            els.chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Run Init
            init();
        });
    </script>
</body>
</html>
